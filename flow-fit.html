<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Watering Can - Product Demo</title>
    <style>
        :root {
            --sage-green: #6C8065;
            --sage-green-light: #84967F;
            --beige: #E6E2DD;
            --text-dark: #1A1A1A;
            --text-light: #FFFFFF;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #FAFAFA;
            overflow: hidden;
            color: var(--text-dark);
        }

        #demo-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: #FAFAFA;
            position: relative;
        }

        /* --- Split Layout --- */
        .left-panel {
            flex: 0 0 35%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 6%;
            background: #FFFFFF;
            z-index: 10;
            box-shadow: 20px 0 50px rgba(0,0,0,0.03);
            border-right: 1px solid #F0F0F0;
        }

        .right-panel {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #F5F5F5;
        }

        /* --- Left Panel UI --- */
        .panel-header {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.95rem;
            color: #A0A0A0;
            margin-bottom: 60px;
            font-weight: 500;
        }

        .plant-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .plant-item {
            position: relative;
            margin: 40px 0;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            opacity: 0.3;
            transform: translateX(-15px);
        }

        .plant-item.active {
            opacity: 1;
            transform: translateX(0);
        }

        .plant-item.active::before {
            content: '';
            position: absolute;
            left: -35px;
            top: 28px;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--sage-green);
            box-shadow: 0 0 15px var(--sage-green);
        }

        .plant-name {
            font-size: 4.5rem;
            font-weight: 300;
            color: var(--text-dark);
            letter-spacing: -1.5px;
            display: block;
            line-height: 1.1;
        }

        .plant-desc {
            font-size: 1.3rem;
            color: var(--sage-green);
            margin-top: 8px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            transition-delay: 0.2s;
            font-weight: 400;
        }

        .plant-item.active .plant-desc {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Right Panel UI --- */
        .bg-image-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .bg-image {
            width: 100%; height: 100%;
            object-fit: cover;
            transform: scale(1.4) translate(-8%, 5%); /* Zoomed in nozzle focus */
            filter: brightness(0.95);
        }

        .light-overlay::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(245,245,245,0.7) 100%);
        }

        /* Glassmorphism */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.05);
            border-radius: 20px;
            padding: 30px 45px;
            text-align: center;
        }

        .bottom-center { 
            position: absolute; 
            bottom: 8%; 
            left: 50%; 
            transform: translateX(-50%); 
            width: auto; 
            min-width: 350px; 
            transition: all 0.5s ease;
        }

        .title-text { 
            font-size: 2.2rem; 
            font-weight: 300; 
            letter-spacing: -0.5px; 
            margin-bottom: 5px; 
            color: var(--text-dark); 
        }

        .subtitle-text { 
            font-size: 1.3rem; 
            font-weight: 400; 
            color: var(--sage-green); 
            transition: opacity 0.5s ease;
        }

        /* --- Nozzle & Water Assembly --- */
        .nozzle-assembly {
            position: absolute;
            top: 15%; 
            left: 50%;
            transform: translateX(-50%);
            width: 500px; 
            height: 85%;
        }

        /* Nozzle HUD */
        .nozzle-hud {
            position: relative;
            width: 360px; height: 360px;
            margin: 0 auto;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0) 70%);
            border: 1px solid rgba(0,0,0,0.03);
            z-index: 5;
        }

        .nozzle-hud::before {
            content: ''; position: absolute; top: -15px; left: -15px; right: -15px; bottom: -15px;
            border: 1px dashed rgba(0,0,0,0.1); border-radius: 50%;
            animation: spinSlow 40s linear infinite;
        }
        @keyframes spinSlow { 100% { transform: rotate(360deg); } }
        
        .hole {
            position: absolute;
            border-radius: 50%;
            background: rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.15);
            transform: translate(-50%, -50%);
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* State: Default (Standby) */
        .right-panel.state-default .hole.inner { width: 22px; height: 22px; opacity: 0.6; }
        .right-panel.state-default .hole.outer { width: 10px; height: 10px; opacity: 0; top: 50%; left: 50%; }
        .right-panel.state-default .hole-i1 { top: 35%; left: 50%; }
        .right-panel.state-default .hole-i2 { top: 50%; left: 65%; }
        .right-panel.state-default .hole-i3 { top: 65%; left: 50%; }
        .right-panel.state-default .hole-i4 { top: 50%; left: 35%; }

        /* State: Basil (Mist Spray - smaller, more numerous, spread out) */
        .right-panel.state-basil .hole { 
            background: var(--sage-green); 
            border-color: var(--sage-green); 
            box-shadow: 0 0 10px rgba(108, 128, 101, 0.4); 
        }
        .right-panel.state-basil .hole.inner { width: 12px; height: 12px; opacity: 1; }
        .right-panel.state-basil .hole.outer { width: 12px; height: 12px; opacity: 1; }
        
        .right-panel.state-basil .hole-o1 { top: 12%; left: 50%; }
        .right-panel.state-basil .hole-o2 { top: 88%; left: 50%; }
        .right-panel.state-basil .hole-o3 { top: 50%; left: 12%; }
        .right-panel.state-basil .hole-o4 { top: 50%; left: 88%; }
        .right-panel.state-basil .hole-o5 { top: 23%; left: 23%; }
        .right-panel.state-basil .hole-o6 { top: 77%; left: 77%; }
        .right-panel.state-basil .hole-o7 { top: 23%; left: 77%; }
        .right-panel.state-basil .hole-o8 { top: 77%; left: 23%; }
        .right-panel.state-basil .hole-o9 { top: 18%; left: 35%; }
        .right-panel.state-basil .hole-o10 { top: 18%; left: 65%; }
        .right-panel.state-basil .hole-o11 { top: 82%; left: 35%; }
        .right-panel.state-basil .hole-o12 { top: 82%; left: 65%; }

        /* State: Monstera (Wide Stream - larger, fewer, concentrated) */
        .right-panel.state-monstera .hole.inner { 
            width: 45px; height: 45px; opacity: 1; 
            background: var(--sage-green); 
            border-color: var(--sage-green); 
            box-shadow: 0 0 25px rgba(108, 128, 101, 0.5);
        }
        .right-panel.state-monstera .hole.outer { width: 0px; height: 0px; opacity: 0; top: 50%; left: 50%; }
        .right-panel.state-monstera .hole-i1 { top: 35%; left: 50%; }
        .right-panel.state-monstera .hole-i2 { top: 50%; left: 65%; }
        .right-panel.state-monstera .hole-i3 { top: 65%; left: 50%; }
        .right-panel.state-monstera .hole-i4 { top: 50%; left: 35%; }

        /* --- Water Flow Output --- */
        .water-container {
            position: relative;
            width: 100%; 
            height: calc(100% - 340px);
            margin-top: -20px;
            z-index: 4;
        }

        .stream {
            position: absolute;
            top: 0;
            height: 100%;
            transform-origin: top center;
            transform: scaleY(0);
            opacity: 0;
            border-radius: 10px;
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 1.5s ease;
        }

        /* Basil Mist Cloud */
        .mist-cloud {
            position: absolute;
            top: 0; left: 10%; width: 80%; height: 100%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0));
            filter: blur(18px);
            clip-path: polygon(30% 0, 70% 0, 100% 100%, 0% 100%);
            transform-origin: top center;
            transform: scaleY(0);
            opacity: 0;
            transition: transform 2s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 2s ease;
        }

        .right-panel.state-basil.water-on .mist-cloud {
            transform: scaleY(1);
            opacity: 0.7;
        }

        /* Basil Streams */
        .mist-stream {
            background: linear-gradient(to bottom, rgba(160, 200, 230, 0.8), rgba(160, 200, 230, 0.1));
            filter: blur(1px);
        }
        
        .right-panel.state-basil.water-on .mist-stream {
            transform: scaleY(1);
            opacity: 1;
            animation: mistFlow 0.8s linear infinite;
        }

        /* Monstera Streams */
        .thick-stream {
            background: linear-gradient(to bottom, rgba(160, 200, 230, 0.95), rgba(160, 200, 230, 0.4));
        }

        .thick-stream-1 { left: 42%; width: 18px; filter: blur(2px); }
        .thick-stream-2 { left: 50%; width: 26px; filter: blur(3px); }
        .thick-stream-3 { left: 58%; width: 14px; filter: blur(2px); }

        .right-panel.state-monstera.water-on .thick-stream {
            transform: scaleY(1);
            opacity: 1;
            animation: mistFlow 0.6s linear infinite;
        }

        @keyframes mistFlow { 0% { background-position: 0 0; } 100% { background-position: 0 300px; } }

        /* --- UI Overlay --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: opacity 0.8s ease;
        }
        #ui-layer.hidden { opacity: 0; pointer-events: none; }
        
        .start-panel { text-align: center; color: var(--text-dark); max-width: 600px; }
        .start-panel h1 { font-size: 3.5rem; margin-bottom: 15px; font-weight: 300; letter-spacing: -1px; }
        .start-panel p { font-size: 1.3rem; opacity: 0.8; margin-bottom: 40px; color: var(--sage-green); }
        
        .primary-btn {
            background: var(--sage-green);
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.1rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(108, 128, 101, 0.3);
        }
        .primary-btn:hover { 
            background: var(--sage-green-light); 
            transform: translateY(-3px); 
            box-shadow: 0 15px 30px rgba(108, 128, 101, 0.4);
        }

        #replay-layer {
            position: absolute;
            bottom: 40px; right: 40px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
        #replay-layer.visible { opacity: 1; pointer-events: auto; }
        
        .replay-btn {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0,0,0,0.05);
            color: var(--text-dark);
            padding: 14px 30px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            font-weight: 500;
        }
        .replay-btn:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }

        /* --- Auto Stop Progress Panel --- */
        .progress-panel {
            position: absolute;
            top: 50%; right: 5%;
            transform: translateY(-50%);
            width: 260px;
            padding: 25px 30px;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
            z-index: 20;
        }
        .progress-panel.visible { opacity: 1; }
        
        .progress-header {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 15px;
        }
        .progress-amounts {
            font-size: 1.2rem;
            color: var(--text-dark);
            margin-bottom: 12px;
            font-weight: 300;
        }
        .current-amount {
            font-size: 2.5rem;
            font-weight: 400;
            color: var(--sage-green);
        }
        .progress-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(0,0,0,0.05);
            border-radius: 2px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--sage-green);
            transition: width 0.1s linear;
        }
        .progress-status {
            font-size: 1.1rem;
            color: var(--text-dark);
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .progress-substatus {
            font-size: 0.95rem;
            color: var(--sage-green);
            margin-top: 5px;
            opacity: 0;
            transition: opacity 0.5s ease;
            line-height: 1.4;
        }
        .progress-panel.complete .progress-status { color: var(--sage-green); }
        .progress-panel.complete .progress-substatus { opacity: 1; }
    </style>
</head>
<body>

<div id="demo-container">

    <!-- Split Screen: Left Panel -->
    <div class="left-panel">
        <div class="panel-header">Plant Selection</div>
        <ul class="plant-list">
            <li id="nav-basil" class="plant-item">
                <span class="plant-name">Basil</span>
                <div class="plant-desc">Mist Spray Mode</div>
            </li>
            <li id="nav-monstera" class="plant-item">
                <span class="plant-name">Monstera</span>
                <div class="plant-desc">Wide Stream Mode</div>
            </li>
        </ul>
    </div>
    
    <!-- Split Screen: Right Panel -->
    <div id="right-panel" class="right-panel state-default">
        <div class="bg-image-container light-overlay">
            <!-- Used watering-can-main.png as the main background representing the nozzle area -->
            <img src="watering-can-main.png" class="bg-image" alt="Watering Can Nozzle">
        </div>
        
        <div class="nozzle-assembly">
            <!-- Nozzle HUD -->
            <div class="nozzle-hud">
                <!-- Inner Holes -->
                <div class="hole inner hole-i1"></div>
                <div class="hole inner hole-i2"></div>
                <div class="hole inner hole-i3"></div>
                <div class="hole inner hole-i4"></div>
                <!-- Outer Holes -->
                <div class="hole outer hole-o1"></div>
                <div class="hole outer hole-o2"></div>
                <div class="hole outer hole-o3"></div>
                <div class="hole outer hole-o4"></div>
                <div class="hole outer hole-o5"></div>
                <div class="hole outer hole-o6"></div>
                <div class="hole outer hole-o7"></div>
                <div class="hole outer hole-o8"></div>
                <div class="hole outer hole-o9"></div>
                <div class="hole outer hole-o10"></div>
                <div class="hole outer hole-o11"></div>
                <div class="hole outer hole-o12"></div>
            </div>
            
            <!-- Water Output Container -->
            <div class="water-container">
                <!-- Basil Mist spray output -->
                <div class="mist-cloud"></div>
                <div class="stream mist-stream" style="left: 20%; width: 2px; animation-delay: 0.1s;"></div>
                <div class="stream mist-stream" style="left: 26%; width: 1px; animation-delay: 0.3s;"></div>
                <div class="stream mist-stream" style="left: 33%; width: 3px; animation-delay: 0.0s;"></div>
                <div class="stream mist-stream" style="left: 41%; width: 2px; animation-delay: 0.4s;"></div>
                <div class="stream mist-stream" style="left: 48%; width: 1px; animation-delay: 0.2s;"></div>
                <div class="stream mist-stream" style="left: 55%; width: 2px; animation-delay: 0.5s;"></div>
                <div class="stream mist-stream" style="left: 63%; width: 3px; animation-delay: 0.1s;"></div>
                <div class="stream mist-stream" style="left: 71%; width: 1px; animation-delay: 0.4s;"></div>
                <div class="stream mist-stream" style="left: 80%; width: 2px; animation-delay: 0.2s;"></div>
                
                <!-- Monstera Wide stream output -->
                <div class="stream thick-stream thick-stream-1" style="animation-delay: 0.0s;"></div>
                <div class="stream thick-stream thick-stream-2" style="animation-delay: 0.2s;"></div>
                <div class="stream thick-stream thick-stream-3" style="animation-delay: 0.1s;"></div>
            </div>
        </div>

        <div class="overlay-text glass-panel bottom-center">
            <h2 class="title-text">Adaptive Nozzle</h2>
            <p id="mode-subtitle" class="subtitle-text">Standby Mode</p>
        </div>
        
        <!-- Auto Stop Progress Panel -->
        <div id="progress-hud" class="glass-panel progress-panel">
            <div class="progress-header">Proper Amount</div>
            <div class="progress-amounts">
                <span id="current-ml" class="current-amount">0</span> / <span id="target-ml" class="target-amount">0</span> ml
            </div>
            <div class="progress-bar-container">
                <div id="progress-bar-fill" class="progress-bar-fill"></div>
            </div>
            <div id="progress-status" class="progress-status">Watering Progress</div>
            <div id="progress-substatus" class="progress-substatus"></div>
        </div>
    </div>
    
    <!-- UI Overlay Start Screen -->
    <div id="ui-layer">
        <div class="start-panel">
            <h1>AI Smart Watering Can</h1>
            <p>Adaptive plant care technology.</p>
            <button id="btn-play" class="primary-btn">Play Demo</button>
        </div>
    </div>

    <!-- Replay Button -->
    <div id="replay-layer">
        <button id="btn-replay" class="replay-btn">↻ Replay Demo</button>
    </div>

</div>

<script>
    let timeouts = [];
    let isPlaying = false;

    async function wait(ms) {
        return new Promise(resolve => {
            const t = setTimeout(resolve, ms);
            timeouts.push(t);
        });
    }

    function clearDemo() {
        timeouts.forEach(t => clearTimeout(t));
        timeouts = [];
        document.getElementById('replay-layer').classList.remove('visible');
        document.getElementById('progress-hud').classList.remove('visible');
    }

    async function startProgressCounter(targetAmount, durationMs) {
        const hud = document.getElementById('progress-hud');
        const currentEl = document.getElementById('current-ml');
        const targetEl = document.getElementById('target-ml');
        const barFill = document.getElementById('progress-bar-fill');
        const statusEl = document.getElementById('progress-status');
        const subStatusEl = document.getElementById('progress-substatus');
        
        hud.classList.remove('complete');
        hud.classList.add('visible');
        targetEl.textContent = targetAmount;
        currentEl.textContent = '0';
        barFill.style.width = '0%';
        statusEl.textContent = 'Watering Progress';
        subStatusEl.textContent = '';
        
        const steps = Math.floor(durationMs / 50); // update roughly every 50ms
        const interval = durationMs / steps;
        
        return new Promise(resolve => {
            let currentStep = 0;
            function update() {
                if(!isPlaying) return resolve();
                
                if (currentStep <= steps) {
                    const currentVal = Math.round((targetAmount / steps) * currentStep);
                    currentEl.textContent = currentVal;
                    barFill.style.width = (currentStep / steps * 100) + '%';
                    currentStep++;
                    timeouts.push(setTimeout(update, interval));
                } else {
                    hud.classList.add('complete');
                    statusEl.textContent = 'Auto Stop Complete';
                    subStatusEl.innerHTML = 'Proper amount reached<br><span style="font-size: 0.8rem; color: #888; margin-top: 8px; display: block;">AI stopped the water flow to prevent overwatering.</span>';
                    resolve();
                }
            }
            update();
        });
    }

    async function updateSubtitle(text) {
        const subtitle = document.getElementById('mode-subtitle');
        subtitle.style.opacity = '0';
        await wait(300);
        subtitle.textContent = text;
        subtitle.style.opacity = '1';
    }

    async function playDemo() {
        if (isPlaying) return;
        isPlaying = true;
        
        document.getElementById('ui-layer').classList.add('hidden');
        clearDemo();

        const rightPanel = document.getElementById('right-panel');
        const navBasil = document.getElementById('nav-basil');
        const navMonstera = document.getElementById('nav-monstera');
        
        // Reset state
        rightPanel.className = 'right-panel state-default';
        navBasil.classList.remove('active');
        navMonstera.classList.remove('active');
        updateSubtitle('Standby Mode');
        
        try {
            await wait(1500);
            
            // --- 1. BASIL SEQUENCE ---
            navBasil.classList.add('active');
            updateSubtitle('Configuring for Basil...');
            await wait(1800);
            
            // Transform Nozzle to Mist Spray
            rightPanel.className = 'right-panel state-basil';
            updateSubtitle('Mist Spray Mode');
            
            // Wait for nozzle morphing to finish visually
            await wait(2200); 
            
            // Turn on water
            rightPanel.classList.add('water-on');
            await startProgressCounter(60, 4000); // 4 seconds to reach 60ml
            
            // Turn off water exactly when progress reaches target
            rightPanel.classList.remove('water-on');
            await wait(2500); // Wait for water to fade out and user to read final text
            
            document.getElementById('progress-hud').classList.remove('visible');
            await wait(500);
            
            // Deactivate Basil
            navBasil.classList.remove('active');
            
            
            // --- 2. MONSTERA SEQUENCE ---
            navMonstera.classList.add('active');
            // Temporarily reset to default nozzle to show the morph clearly
            rightPanel.className = 'right-panel state-default';
            updateSubtitle('Configuring for Monstera...');
            await wait(1500);
            
            // Transform Nozzle to Wide Stream
            rightPanel.className = 'right-panel state-monstera';
            updateSubtitle('Wide Stream Mode');
            
            // Wait for nozzle morphing to finish visually
            await wait(2200); 
            
            // Turn on water
            rightPanel.classList.add('water-on');
            await startProgressCounter(120, 5000); // 5 seconds to reach 120ml
            
            // Turn off water exactly when progress reaches target
            rightPanel.classList.remove('water-on');
            await wait(2500); // Wait for water to fade out and user to read final text
            
            document.getElementById('progress-hud').classList.remove('visible');
            await wait(500);
            
            // --- END ---
            navMonstera.classList.remove('active');
            rightPanel.className = 'right-panel state-default';
            updateSubtitle('Demo Complete');
            
            await wait(1000);
            document.getElementById('replay-layer').classList.add('visible');
            isPlaying = false;
            
        } catch (e) {
            isPlaying = false;
        }
    }

    document.getElementById('btn-play').addEventListener('click', playDemo);
    document.getElementById('btn-replay').addEventListener('click', playDemo);
</script>

</body>
</html>
